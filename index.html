<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Nicole Jane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Background Music -->
    <audio id="bg-music" loop>
        <!-- Using a placeholder ambient chilling track, replace with your own if needed -->
        <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <!-- Background elements for Museum feel -->
        <div id="background-pillars"></div>

        <!-- The scrolling world -->
        <div id="museum-world">
            <!-- Floor line -->
            <div id="floor"></div>

            <!-- Paintings -->
            <div class="painting-zone" style="left: 600px;" data-title="The Beginning" data-desc="This is where our story starts. Every great journey begins with a single step, and I'm so glad I took it with you.">
                <div class="spotlight"></div>
                <img src="images/1st.jpg" class="painting" alt="Memory 1">
            </div>

            <div class="painting-zone" style="left: 1400px;" data-title="Getting Closer" data-desc="Days turned into weeks, and every moment spent together became a treasure I hold closely to my heart.">
                <div class="spotlight"></div>
                <img src="images/2nd.jpg" class="painting" alt="Memory 2">
            </div>

            <div class="painting-zone" style="left: 2200px;" data-title="Unforgettable Memories" data-desc="I still remember this day perfectly. The laughs we shared are etched in my mind forever.">
                <div class="spotlight"></div>
                <img src="images/3rd.JPG" class="painting" alt="Memory 3">
            </div>

            <div class="painting-zone" style="left: 3000px;" data-title="Through Thick and Thin" data-desc="Even when things get tough, having you by my side makes everything feel like it's going to be okay.">
                <div class="spotlight"></div>
                <img src="images/4th.jpg" class="painting" alt="Memory 4">
            </div>

            <div class="painting-zone" style="left: 3800px;" data-title="Adventures" data-desc="Every new place we explore becomes my favorite place, simply because you are there.">
                <div class="spotlight"></div>
                <img src="images/5th.jpg" class="painting" alt="Memory 5">
            </div>

            <div class="painting-zone" style="left: 4600px;" data-title="Growing Together" data-desc="Watching you grow and achieve your dreams inspires me every single day. You are amazing.">
                <div class="spotlight"></div>
                <img src="images/6th.jpg" class="painting" alt="Memory 6">
            </div>

            <div class="painting-zone" style="left: 5400px;" data-title="My Favorite Smile" data-desc="Your smile lights up my world more than any museum spotlight ever could.">
                <div class="spotlight"></div>
                <img src="images/7th.jpg" class="painting" alt="Memory 7">
            </div>

            <div class="painting-zone" style="left: 6200px;" data-title="Happy Birthday, Nicole Jane!" data-desc="I can't wait to fill more galleries with our memories. Have the most wonderful birthday!">
                <div class="spotlight"></div>
                <img src="images/8th.jpg" class="painting" alt="Memory 8">
            </div>
            
            <div class="end-wall" style="left: 6800px;"></div>
        </div>

        <!-- The Character -->
        <div id="character" class="idle">
            <div class="pixel-girl">
                <div class="head">
                    <div class="hair"></div>
                    <div class="eye"></div>
                </div>
                <div class="body">
                    <div class="arm"></div>
                </div>
                <div class="legs">
                    <div class="leg left-leg"></div>
                    <div class="leg right-leg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- Fixed readable message box -->
        <div id="ui-message-box">
            <h3 id="ui-title"></h3>
            <p id="ui-desc"></p>
        </div>

        <div id="instruction">Tap screen or use Arrow Keys to walk.<br>Music will play automatically.</div>
        <div id="touch-left" class="touch-zone"></div>
        <div id="touch-right" class="touch-zone"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
